<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Likes · NA:log</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/logs.css">
<link rel="stylesheet" href="css/likes.css">
</head>
<body class="likes-page">

  <section class="likes-grid-view" id="likes-grid-view">
    <header class="likes-header">
      <a class="likes-back" href="desktop.html">← 桌面</a>
      <h1 class="likes-title">Likes</h1>
    </header>

    <div class="tag-bar" id="tag-bar"></div>

    <div class="likes-grid" id="likes-grid"></div>
    <p class="likes-empty" id="likes-empty" hidden>还没有收藏，去 Logs 里点亮一些气泡吧 ✦</p>
  </section>

  <section class="like-detail-view" id="like-detail-view" hidden>
    <header class="detail-topbar">
      <button class="detail-back" id="detail-back-btn" type="button" aria-label="返回">←</button>
      <span class="detail-title" id="detail-title"></span>
    </header>

    <div class="detail-body" id="detail-body"></div>

    <div class="detail-tags-editor">
      <div class="detail-tags-list" id="detail-tags-list"></div>
      <form class="detail-tag-form" id="detail-tag-form" autocomplete="off">
        <input type="text" id="detail-tag-input" placeholder="加个标签" maxlength="12">
        <button type="submit">添加</button>
      </form>
      <button class="detail-unbookmark" id="detail-unbookmark-btn" type="button">取消收藏</button>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/crypto.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/bookmarks.js"></script>
  <script src="js/likes.js"></script>
</body>
</html>
