<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NA:log</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/desktop.css">
</head>
<body class="y2k-bg">

  <div id="sparkle-layer"></div>

  <main class="desktop-frame">
    <header class="desktop-header">
      <span class="desktop-title">NA<span class="logo-colon">:</span>log</span>
    </header>

    <div class="app-grid">

      <a class="app-icon" href="logs.html">
        <span class="app-tile tile-logs">
          <svg viewBox="0 0 16 16" class="app-svg">
            <rect x="2" y="3" width="12" height="8" rx="1" fill="currentColor"/>
            <rect x="4" y="12" width="3" height="2" fill="currentColor"/>
            <rect x="4" y="5" width="8" height="1.5" fill="#fff" opacity="0.6"/>
            <rect x="4" y="7.5" width="6" height="1.5" fill="#fff" opacity="0.6"/>
          </svg>
        </span>
        <span class="app-label">Logs</span>
      </a>

      <a class="app-icon" href="likes.html">
        <span class="app-tile tile-likes">
          <svg viewBox="0 0 16 16" class="app-svg">
            <path d="M8 13 2 8a3 3 0 0 1 5-3l1 1 1-1a3 3 0 0 1 5 3z" fill="currentColor"/>
          </svg>
        </span>
        <span class="app-label">Likes</span>
      </a>

      <a class="app-icon" href="import.html">
        <span class="app-tile tile-import">
          <svg viewBox="0 0 16 16" class="app-svg">
            <rect x="2" y="11" width="12" height="2" fill="currentColor"/>
            <rect x="7" y="2" width="2" height="6" fill="currentColor"/>
            <rect x="4.5" y="6.5" width="7" height="2" fill="currentColor" transform="rotate(45 8 7.5)"/>
            <rect x="4.5" y="6.5" width="7" height="2" fill="currentColor" transform="rotate(-45 8 7.5)"/>
          </svg>
        </span>
        <span class="app-label">Import</span>
      </a>

      <span class="app-icon disabled" aria-disabled="true">
        <span class="app-tile tile-placeholder">
          <svg viewBox="0 0 16 16" class="app-svg">
            <path d="M2 9 Q5 5 8 9 T14 9" stroke="currentColor" stroke-width="1.6" fill="none"/>
          </svg>
        </span>
        <span class="app-label">River</span>
      </span>

      <span class="app-icon disabled" aria-disabled="true">
        <span class="app-tile tile-placeholder">
          <svg viewBox="0 0 16 16" class="app-svg">
            <rect x="3" y="9" width="2" height="5" fill="currentColor"/>
            <rect x="7" y="5" width="2" height="9" fill="currentColor"/>
            <rect x="11" y="2" width="2" height="12" fill="currentColor"/>
          </svg>
        </span>
        <span class="app-label">Counts</span>
      </span>

      <span class="app-icon disabled" aria-disabled="true">
        <span class="app-tile tile-placeholder">
          <svg viewBox="0 0 16 16" class="app-svg">
            <path d="M8 1 10 6 15 6.5 11 10 12 15 8 12.3 4 15 5 10 1 6.5 6 6Z" fill="currentColor"/>
          </svg>
        </span>
        <span class="app-label">Stars</span>
      </span>

      <span class="app-icon disabled" aria-disabled="true">
        <span class="app-tile tile-placeholder">
          <svg viewBox="0 0 16 16" class="app-svg">
            <circle cx="8" cy="8" r="2.4" fill="none" stroke="currentColor" stroke-width="1.6"/>
            <rect x="7.2" y="1" width="1.6" height="2.4" fill="currentColor"/>
            <rect x="7.2" y="12.6" width="1.6" height="2.4" fill="currentColor"/>
            <rect x="1" y="7.2" width="2.4" height="1.6" fill="currentColor"/>
            <rect x="12.6" y="7.2" width="2.4" height="1.6" fill="currentColor"/>
          </svg>
        </span>
        <span class="app-label">Setting</span>
      </span>

    </div>
  </main>

  <script src="js/sparkle.js"></script>
  <script src="js/crypto.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/desktop.js"></script>
</body>
</html>
